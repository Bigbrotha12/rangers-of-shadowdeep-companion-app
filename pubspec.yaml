name: rangers_mobile
description: "Companion app for Rangers of Shadow Deep"
publish_to: 'none'
version: 1.1.2+1 # Sync with lib/version.dart

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Routing
  go_router: ^14.8.1

  # UI
  shared_preferences: ^2.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  drift_dev: ^2.22.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/rangers/
    - assets/images/companions/
    - assets/images/items/
    - assets/images/ui/

flutter_icons:
  android: true
  image_path: "assets/ui/app_icon.png"